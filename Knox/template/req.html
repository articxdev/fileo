<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ heading }}</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="Stream '{{ file_name }}'">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Vidstack Player -->
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/theme.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/video.css" />
    <script type="module" src="https://cdn.vidstack.io/player"></script>

    <style>
        :root {
            --bg-color: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .header-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .header-links a:hover {
            color: var(--text-main);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 20px;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .title-section {
            width: 100%;
            margin-bottom: 24px;
            text-align: center;
        }

        .file-title {
            font-size: 1.5rem;
            font-weight: 600;
            word-break: break-word;
            margin-bottom: 8px;
        }

        .player-wrapper {
            width: 100%;
            max-width: 960px;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        .action-bar {
            display: flex;
            gap: 16px;
            margin-top: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: var(--surface-hover);
            transform: translateY(-2px);
        }

        .btn.primary {
            background: var(--primary);
            color: #0f172a;
            border-color: var(--primary);
        }

        .btn.primary:hover {
            background: #0ea5e9;
            border-color: #0ea5e9;
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* External Players Drawer */
        .drawer-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 40;
        }

        .drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .drawer {
            position: fixed;
            bottom: -100%;
            left: 0;
            right: 0;
            background: var(--bg-color);
            border-top: 1px solid var(--border);
            border-radius: 24px 24px 0 0;
            padding: 32px 24px;
            z-index: 50;
            transition: bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .drawer.active {
            bottom: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            max-width: 960px;
            margin-left: auto;
            margin-right: auto;
        }

        .drawer-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .close-btn:hover { color: var(--text-main); background: var(--surface); }
        .close-btn svg { width: 24px; height: 24px; fill: currentColor; }

        .drawer-content {
            max-width: 960px;
            margin: 0 auto;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .player-category {
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .player-card:hover {
            background: var(--surface-hover);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .footer {
            padding: 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }
        
        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-main);
            color: var(--bg-color);
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            opacity: 0;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; gap: 12px; }
            .header-links { margin-left: 0; display: flex; gap: 16px; }
            .action-bar { flex-direction: column; width: 100%; max-width: 320px; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="brand">File Stream</a>
        <div class="header-links">
            <a href="https://t.me/knoxprojects" target="_blank">Telegram Channel</a>
            <a href="https://github.com/articxdev/fileo" target="_blank">GitHub</a>
        </div>
    </header>

    <main class="main-content">
        <div class="title-section">
            <h1 class="file-title">{{ file_name }}</h1>
        </div>

        <div class="player-wrapper">
            <media-player id="player" title="{{ file_name }}" playsinline>
                <media-provider>
                    <source src="{{ src }}" type="video/mp4" />
                </media-provider>
                <media-video-layout></media-video-layout>
            </media-player>
        </div>

        <div class="action-bar">
            <a href="{{ src }}" download="{{ file_name }}" class="btn primary">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                Download File
            </a>
            
            <button class="btn" id="copyBtn">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                Copy Link
            </button>

            <button class="btn" id="openInBtn">
                <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM9.5 7.5v9l7-4.5-7-4.5z"/></svg>
                Open in App
            </button>
        </div>
    </main>

    <div class="drawer-overlay" id="overlay"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-header">
            <div class="drawer-title">Open in External Player</div>
            <button class="close-btn" id="closeDrawer">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
        </div>
        
        <div class="drawer-content">
            <div class="player-category">Android</div>
            <div class="player-grid">
                <a href="intent:{{ src }}#Intent;action=android.intent.action.VIEW;type=video/*;package=org.videolan.vlc;end" class="player-card">VLC</a>
                <a href="intent:{{ src }}#Intent;action=android.intent.action.VIEW;type=video/*;package=com.mxtech.videoplayer.ad;S.title={{ file_name }};end" class="player-card">MX Player</a>
                <a href="intent:{{ src }}#Intent;action=android.intent.action.VIEW;type=video/*;package=org.courville.nova;S.title={{ file_name }};end" class="player-card">Nova Player</a>
                <a href="intent:{{ src }}#Intent;action=android.intent.action.VIEW;type=video/*;package=is.xyz.mpv;S.title={{ file_name }};end" class="player-card">MPV</a>
                <a href="intent:{{ src }}#Intent;action=android.intent.action.VIEW;type=video/*;package=com.brouken.player;end" class="player-card">Just Player</a>
            </div>

            <div class="player-category">iOS / macOS</div>
            <div class="player-grid">
                <a href="vlc-x-callback://x-callback-url/stream?url={{ src }}" class="player-card">VLC</a>
                <a href="infuse://x-callback-url/play?url={{ src }}" class="player-card">Infuse</a>
                <a href="outplayer://{{ src }}" class="player-card">Outplayer</a>
                <a href="iina://weblink?url={{ src }}" class="player-card">IINA (Mac)</a>
            </div>

            <div class="player-category">Windows</div>
            <div class="player-grid">
                <a href="vlc://{{ src }}" class="player-card">VLC</a>
                <a href="potplayer://{{ src }}" class="player-card">PotPlayer</a>
                <a href="mpv://{{ src }}" class="player-card">MPV</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        &copy; 2026 File Stream Bot • <a href="https://t.me/knoxprojects" target="_blank">Join Telegram Channel</a>
    </footer>

    <div class="toast" id="toast">Link copied to clipboard!</div>

    <script>
        // Copy functionality
        document.getElementById('copyBtn').addEventListener('click', async () => {
            try {
                // Ensure absolute URL
                const link = new URL('{{ src }}', window.location.href).href;
                await navigator.clipboard.writeText(link);
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            } catch (err) {
                alert('Failed to copy link.');
            }
        });

        // Drawer functionality
        const overlay = document.getElementById('overlay');
        const drawer = document.getElementById('drawer');
        const openBtn = document.getElementById('openInBtn');
        const closeBtn = document.getElementById('closeDrawer');

        function openDrawer() {
            overlay.classList.add('active');
            drawer.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDrawer() {
            overlay.classList.remove('active');
            drawer.classList.remove('active');
            document.body.style.overflow = '';
        }

        openBtn.addEventListener('click', openDrawer);
        closeBtn.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);
    </script>
</body>
</html>
