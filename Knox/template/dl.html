<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloading: {{ file_name }}</title>
    <meta http-equiv="refresh" content="1;url={{ src }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
        }
        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 440px;
            width: 90%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            font-weight: 600;
        }
        p {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        .filename {
            color: #e2e8f0;
            font-weight: 600;
            word-break: break-all;
            display: block;
            margin-top: 8px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .btn {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Downloading File</h1>
        <p>Your download should start automatically in a moment.<br><span class="filename">{{ file_name }}</span></p>
        <a href="{{ src }}" download="{{ file_name }}" class="btn">Click here if it doesn't</a>
    </div>
</body>
</html>
